<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sibyl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <div class="brand-mark">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <circle cx="14" cy="14" r="13" stroke="#C9A84C" stroke-width="1"/>
              <circle cx="14" cy="14" r="4" fill="#C9A84C" opacity="0.9"/>
              <line x1="14" y1="1" x2="14" y2="6" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
              <line x1="14" y1="22" x2="14" y2="27" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
              <line x1="1" y1="14" x2="6" y2="14" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
              <line x1="22" y1="14" x2="27" y2="14" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
              <line x1="4.5" y1="4.5" x2="8" y2="8" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
              <line x1="20" y1="20" x2="23.5" y2="23.5" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
              <line x1="23.5" y1="4.5" x2="20" y2="8" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
              <line x1="8" y1="20" x2="4.5" y2="23.5" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
            </svg>
          </div>
          <span class="brand-name">Sibyl</span>
        </div>

        <button class="new-chat-btn" id="newChatBtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          New conversation
        </button>
      </div>

      <nav class="history-nav">
        <p class="history-label">Recent</p>
        <ul class="history-list" id="historyList">
          <!-- populated by JS -->
        </ul>
      </nav>

      <div class="sidebar-bottom">
        <div class="model-badge">
          <span class="model-dot"></span>
          claude-sonnet-4-6
        </div>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">

      <!-- Empty state / welcome -->
      <div class="welcome" id="welcome">
        <div class="oracle-emblem">
          <div class="oracle-glow"></div>
          <div class="oracle-ring outer"></div>
          <div class="oracle-ring inner"></div>
          <div class="oracle-eye">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <circle cx="18" cy="18" r="17" stroke="#C9A84C" stroke-width="0.75" opacity="0.4"/>
              <circle cx="18" cy="18" r="6" fill="#C9A84C" opacity="0.9"/>
              <circle cx="18" cy="18" r="3" fill="#0E0D14"/>
              <circle cx="19.5" cy="16.5" r="1" fill="#C9A84C" opacity="0.6"/>
            </svg>
          </div>
        </div>
        <h1 class="welcome-title">Sibyl knows.</h1>
        <p class="welcome-sub">Ask anything. The oracle is listening.</p>
        <div class="starter-prompts">
          <button class="starter" data-prompt="What does my future hold?">What does my future hold?</button>
          <button class="starter" data-prompt="Explain quantum entanglement like a poet.">Explain quantum entanglement like a poet.</button>
          <button class="starter" data-prompt="What is the nature of consciousness?">What is the nature of consciousness?</button>
          <button class="starter" data-prompt="Give me an unconventional life philosophy.">Give me an unconventional life philosophy.</button>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages"></div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-wrap">
          <textarea
            id="userInput"
            class="input-field"
            placeholder="Ask Sibyl anything…"
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 8L14 2L10 8L14 14L2 8Z" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Sibyl may be wrong. Use your own judgment.</p>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
